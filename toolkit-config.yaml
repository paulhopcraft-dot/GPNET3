# Claude Code Toolkit Configuration
# Edit this file to customize toolkit behavior
# Run /config to view or modify settings

# Model Settings
model: opus                      # Default model: sonnet | opus | haiku
thinking_mode: normal            # Thinking mode: normal | extended

# Morning Brief Settings
morning_brief:
  enabled: true
  channels:                      # YouTube channels to summarize - VERIFIED WORKING HANDLES
    - "@patloeber"                # Patrick Loeber - Google DeepMind
    - "@twominutepapers"          # Two Minute Papers - AI research summaries
    - "@freecodecamp"             # freeCodeCamp - Claude tutorials
    - "@traversymedia"            # Traversy Media - web development
    - "@aiDotEngineer"            # AI engineering content
    - "@NateBJones"               # AI development workflows
    - "@ycombinator"              # startup/AI content
    - "@EfficientNLP"             # NLP and language models
  max_videos: 5                  # Max videos per channel to check
  lookback_hours: 24             # Only videos from last N hours
  summary_style: bullets         # Output style: bullets | prose | detailed
  topics:
    - Claude
    - Anthropic
    - AI agents
    - prompt engineering
    - API integration
    - model context protocol
    - MCP
    - tool use
    - LLM workflows

# Project Registry
projects:
  - name: Factori
    path: /mnt/d/dev/Factori
    type: python
    priority: CRITICAL
  - name: engram
    path: /mnt/d/dev/engram
    type: python
    priority: CRITICAL
  - name: unified-memory
    path: /mnt/d/dev/unified-memory
    type: python
    priority: CRITICAL
  - name: lumerli
    path: /mnt/d/dev/lumerli
    type: node
    priority: HIGH
  - name: preventli
    path: /mnt/d/dev/preventli
    type: node
    priority: HIGH
  - name: journey-board
    path: /mnt/d/dev/journey-board
    type: node
    priority: HIGH
  - name: influence-engine
    path: /mnt/d/dev/influence-engine
    type: node
    priority: HIGH
  - name: clawdbot
    path: /home/paul_clawdbot/dev/clawdbot
    type: node
    priority: CRITICAL
  - name: ecosystem
    path: /mnt/d/dev/ecosystem
    type: node
    priority: MEDIUM
  - name: henry
    path: /mnt/d/dev/henry
    type: python
    priority: MEDIUM
  - name: claude-pipeline
    path: /mnt/d/dev/claude-pipeline
    type: python
    priority: MEDIUM
  - name: gpnet3
    path: /mnt/d/dev/gpnet3
    type: node
    priority: LOW

# Sync Settings
sync:
  auto_sync: false               # Auto-sync toolkit on session start
  sync_on_commit: false          # Sync after each commit
  exclude_projects: []           # Projects to skip during sync

# Test Runner Settings
test_runner:
  parallel: false                # Run project tests in parallel
  verbose: false                 # Show detailed test output
  stop_on_failure: false         # Stop after first failing project
  timeout_seconds: 300           # Max time per project

# Display Settings
display:
  show_cost_estimates: true      # Show cost estimates for large tasks
  show_time_estimates: true      # Show time estimates
  compact_status: false          # Use compact status output
